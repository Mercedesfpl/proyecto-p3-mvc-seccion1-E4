<!-- frontend/views/auth/forgot-password.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Contraseña - Movilidad Guaicaipuro</title>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- CSS -->
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/auth.css">
</head>
<body class="auth-body">
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon">
                    <i class="fas fa-bus"></i>
                </div>
                <h1>Recuperación clave</h1>
                <p>-</p>
            </div>
            
            <div class="auth-body-content">
                <h2>¿Olvidaste tu contraseña?</h2>
                <p class="auth-subtitle">Ingresa tu correo electrónico y te enviaremos un código de recuperación</p>
                
                <!-- PASO 1: Solicitar correo -->
                <div id="step1" class="step-container">
                    <form id="forgotForm" class="auth-form">
                        <div class="form-group">
                            <label for="email">
                                <i class="fas fa-envelope"></i>
                                Correo Electrónico
                            </label>
                            <input type="email" id="resetEmail" name="email" placeholder="correo@ejemplo.com" required>
                        </div>
                        
                        <button type="submit" class="btn-forgot" id="sendCodeBtn">
                            <i class="fas fa-paper-plane"></i>
                            Enviar código
                        </button>
                    </form>
                </div>
                
                <!-- PASO 2: Verificar código (oculto al inicio) -->
                <div id="step2" class="step-container" style="display: none;">
                    <form id="verifyCodeForm" class="auth-form">
                        <div class="form-group">
                            <label for="code">
                                <i class="fas fa-key"></i>
                                Código de verificación
                            </label>
                            <input type="text" id="code" name="code" placeholder="Ingresa el código de 6 dígitos" maxlength="6">
                            <small class="form-hint">Revisa tu correo electrónico</small>
                        </div>
                        
                        <button type="submit" class="btn-forgot" id="verifyCodeBtn">
                            <i class="fas fa-check-circle"></i>
                            Verificar código
                        </button>
                    </form>
                </div>
                
                <!-- PASO 3: Nueva contraseña (oculto al inicio) -->
                <div id="step3" class="step-container" style="display: none;">
                    <form id="resetPasswordForm" class="auth-form">
                        <div class="form-group">
                            <label for="newPassword">
                                <i class="fas fa-lock"></i>
                                Nueva contraseña
                            </label>
                            <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
                            <div class="password-strength" id="newPasswordStrength"></div>
                            <small class="form-hint">Mínimo 8 caracteres, una mayúscula, una minúscula, un número y un caracter especial (!@#$%&/)</small>
                        </div>
                        
                        <div class="form-group">
                            <label for="confirmNewPassword">
                                <i class="fas fa-check-circle"></i>
                                Confirmar nueva contraseña
                            </label>
                            <input type="password" id="confirmNewPassword" name="confirmNewPassword" placeholder="••••••••" required>
                        </div>
                        
                        <button type="submit" class="btn-forgot" id="resetPasswordBtn">
                            <i class="fas fa-save"></i>
                            Restablecer contraseña
                        </button>
                    </form>
                </div>
                
                <div class="auth-footer">
                    <p><a href="{{ url_for('auth.login_page') }}">← Volver al inicio de sesión</a></p>
                </div>
            </div>
        </div>
    </div>

    <div id="toastMessage" class="toast-message"></div>

    <script src="../../static/js/auth.js"></script>
</body>
</html>
