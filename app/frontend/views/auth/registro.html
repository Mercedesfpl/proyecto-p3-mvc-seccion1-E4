<!-- frontend/views/auth/registro.html -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Movilidad Guaicaipuro</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../static/css/global.css">
    <link rel="stylesheet" href="../../static/css/auth.css">
</head>
<body class="auth-body">
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <div class="logo-icon"><i class="fas fa-bus"></i></div>
                <h1>Movilidad Guaicaipuro</h1>
                <p>Alcaldía del Municipio Guaicaipuro</p>
            </div>
            
            <div class="auth-body-content">
                <h2>Crear Cuenta</h2>
                <p class="auth-subtitle">Regístrate para acceder al sistema</p>
                
                <form id="registroForm" class="auth-form">
                    
                    <!-- FILA 1: Nombre y Correo -->
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-user"></i> Nombre Completo</label>
                            <input type="text" id="fullName" placeholder="Francis Pérez" required>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-envelope"></i> Correo Electrónico</label>
                            <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                        </div>
                    </div>
                    
                    <!-- FILA 2: Contraseña y Confirmar -->
                    <div class="form-row">
                        <div class="form-group">
                            <label><i class="fas fa-lock"></i> Contraseña</label>
                            <input type="password" id="password" placeholder="••••••••" required>
                            <div class="password-strength" id="passwordStrength"></div>
                        </div>
                        <div class="form-group">
                            <label><i class="fas fa-check-circle"></i> Confirmar Contraseña</label>
                            <input type="password" id="confirmPassword" placeholder="••••••••" required>
                        </div>
                    </div>
                    
                    <!-- FILA 3: Términos (ocupa toda la fila) -->
                    <div class="form-full-width">
                        <label class="checkbox-label">
                            <input type="checkbox" id="terms" required>
                            <span>Acepto los <a href="#">términos y condiciones</a></span>
                        </label>
                    </div>
                    
                    <!-- BOTÓN -->
                    <button type="submit" class="btn-register">
                        <i class="fas fa-user-plus"></i> Registrarse
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>¿Ya tienes una cuenta? <a href="{{ url_for('auth.login_page') }}">Inicia sesión aquí</a></p>
                </div>
            </div>
        </div>
    </div>
    
    <div id="toastMessage" class="toast-message"></div>
    <script src="../../static/js/auth.js"></script>
</body>
</html>
