<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  </head>
  <body>
    <h1>Prueba gay</h1>
    <button id="btnEnviar">Enviar información</button>
    <div id="mensaje"></div>

    <script>
      var socket = io();

      //Evento para saber si está conectado
      socket.on("connect", function () {
        console.log("Conectado");
        agregarMensaje("Conectado");
      });

      //Evento para recibir si no está conectado
      socket.on("disconnect", function () {
        console.log("No conectado");
        agregarMensaje("No conectado");
      });

      //Evento para recibir información del web socket
      socket.on("nueva_ubicacion", function (data) {
        console.log("Nueva ubicación", data);
        agregarMensaje("Recibido: " + JSON.stringify(data));
      });

      //Botón para enviar una ubicación simulada
      document.getElementById("btnEnviar").onclick = function () {
        var ubicacion = {
          bus_ID: "Test-1",
          lat: 10.5,
          lng: -66.9,
        };
        console.log("Enviando: ", ubicacion);
        socket.emit("ubicacion_bus", ubicacion);
        agregarMensaje("Enviado: " + JSON.stringify(ubicacion));
      };

      function agregarMensaje(texto) {
        var div = document.getElementById("mensaje");
        div.innerHTML += "<p>" + texto + "</p>";
        console.log(texto);
      }
    </script>
  </body>
</html>
